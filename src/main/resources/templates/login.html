<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Connexion</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div><a th:href="@{/}" th:text="#{app.name}">Events Portal</a></div>
    <div class="lang-switch">
        <a th:href="@{/login(lang='fr')}">FR</a>
        <a th:href="@{/login(lang='en')}">EN</a>
        <a th:href="@{/login(lang='ar')}">AR</a>
    </div>
</header>

<div class="container">
    <h2 th:text="#{login.heading}">Connexion</h2>

    <div th:if="${successMessage}" class="alert" th:text="${successMessage}"></div>
    <div th:if="${param.error}" class="error" th:text="#{login.error}"></div>
    <div th:if="${param.logout}" class="alert" th:text="#{login.logout}"></div>

    <form th:action="@{/login}" method="post">
        <label for="username" th:text="#{label.email}">Email</label>
        <input type="email" id="username" name="username" required>

        <label for="password" th:text="#{label.password}">Mot de passe</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" th:text="#{nav.login}">Connexion</button>
    </form>

    <p>
        <span th:text="#{login.noAccount}">Pas de compte ?</span>
        <a th:href="@{/register}" th:text="#{nav.register}">Inscription</a>
    </p>
</div>
</body>
</html>
