<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{home.title}">Portail des evenements</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div>
        <a th:href="@{/}" th:text="#{app.name}">Events Portal</a>
        <span sec:authorize="isAuthenticated()" th:text="' - ' + #{label.hello} + ' ' + #authentication.name"></span>
    </div>
    <div class="lang-switch">
        <a th:href="@{/(lang='fr')}">FR</a>
        <a th:href="@{/(lang='en')}">EN</a>
        <a th:href="@{/(lang='ar')}">AR</a>
    </div>
</header>

<div class="container">
    <h1 th:text="#{home.heading}">Bienvenue</h1>
    <p th:text="#{home.description}">Description</p>

    <div sec:authorize="isAnonymous()">
        <a th:href="@{/login}" th:text="#{nav.login}">Connexion</a> |
        <a th:href="@{/register}" th:text="#{nav.register}">Inscription</a>
    </div>

    <div sec:authorize="isAuthenticated()">
        <a th:href="@{/events}" th:text="#{nav.events}">Evenements</a> |
        <a th:href="@{/my-registrations}" th:text="#{nav.myregistrations}">My Registrations</a> |
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="logout-link" th:text="#{nav.logout}">Deconnexion</button>
        </form>
    </div>
</div>
</body>
</html>
