<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{register.title}">Inscription</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div><a th:href="@{/}" th:text="#{app.name}">Events Portal</a></div>
    <div class="lang-switch">
        <a th:href="@{/register(lang='fr')}">FR</a>
        <a th:href="@{/register(lang='en')}">EN</a>
        <a th:href="@{/register(lang='ar')}">AR</a>
    </div>
</header>

<div class="container">
    <h2 th:text="#{register.heading}">Inscription</h2>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <label for="displayName" th:text="#{label.name}">Nom</label>
        <input id="displayName" th:field="*{displayName}" required>
        <div class="error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></div>

        <label for="email" th:text="#{label.email}">Email</label>
        <input id="email" type="email" th:field="*{email}" required>
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <label for="password" th:text="#{label.password}">Mot de passe</label>
        <input id="password" type="password" th:field="*{password}" required>
        <small th:text="#{register.password.rule}">Rule</small>
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

        <label for="confirmPassword" th:text="#{label.confirmPassword}">Confirmer</label>
        <input id="confirmPassword" type="password" th:field="*{confirmPassword}" required>
        <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>

        <button type="submit" th:text="#{nav.register}">Inscription</button>
    </form>

    <p>
        <span th:text="#{register.haveAccount}">Deja inscrit ?</span>
        <a th:href="@{/login}" th:text="#{nav.login}">Connexion</a>
    </p>
</div>
</body>
</html>
